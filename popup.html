<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Wayback Opener</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      width: 260px;
      padding: 12px;
      margin: 0;
    }
    h1 {
      font-size: 14px;
      margin: 0 0 10px;
    }
    label {
      display: block;
      font-size: 12px;
      margin-top: 8px;
      margin-bottom: 2px;
      color: #333;
    }
    input[type="number"] {
      width: 100%;
      box-sizing: border-box;
      padding: 4px;
      font-size: 12px;
    }
    button {
      width: 100%;
      padding: 6px;
      margin-top: 10px;
      font-size: 13px;
      cursor: pointer;
    }
    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #444;
      min-height: 32px;
    }
  </style>
</head>
<body>
  <h1>Wayback Machine Page Opener</h1>

  <button id="scanBtn">Scan this page for links</button>

  <label for="maxTabs">Max tabs to open</label>
  <input type="number" id="maxTabs" value="50" min="1" />

  <label for="delay">Delay between tabs (ms)</label>
  <input type="number" id="delay" value="250" min="0" />

  <button id="openBtn" disabled>Open all found links</button>

  <div id="status">Navigate to a web.archive.org page, then click "Scan".</div>

  <script src="popup.js"></script>
</body>
</html>
